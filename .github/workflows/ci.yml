name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The ERO core + tests are pure stdlib and network-free — no install needed.
      - name: Run network-free test suite
        run: |
          fail=0
          for t in tests/*.py; do
            echo "::group::$t"
            python "$t" || fail=1
            echo "::endgroup::"
          done
          exit $fail

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Import check (installed)
        run: |
          python -m pip install dist/*.whl
          python -c "import ero, ero.openai_api, ero.cli; print('import OK', ero.DEFAULT_MODEL_ID)"
